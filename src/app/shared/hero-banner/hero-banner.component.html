<section
  class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-orange-700 via-amber-700 to-stone-900 p-8 text-white shadow-xl sm:p-12"
>
  <div
    class="pointer-events-none absolute -right-16 -top-16 h-64 w-64 rounded-full bg-white/10 blur-3xl"
  ></div>
  <div
    class="pointer-events-none absolute -bottom-20 left-1/3 h-56 w-56 rounded-full bg-orange-400/20 blur-3xl"
  ></div>

  <div class="relative flex flex-col items-center gap-8 lg:flex-row lg:items-center lg:justify-between">
    <div class="max-w-xl">
      <p class="text-xs font-semibold uppercase tracking-[0.3em] text-amber-200">{{ eyebrow }}</p>
      <h2 class="mt-3 text-3xl font-bold leading-tight sm:text-4xl">{{ title }}</h2>
      <p class="mt-4 text-sm text-orange-50 sm:text-base">{{ subtitle }}</p>

      <div class="mt-8 flex flex-wrap gap-3">
        <ng-content></ng-content>
      </div>
    </div>

    <div class="relative hidden h-48 w-48 shrink-0 sm:block lg:h-56 lg:w-56">
      <div
        class="pointer-events-none absolute inset-0 rounded-full bg-gradient-to-br from-amber-300/40 via-transparent to-transparent blur-xl"
      ></div>
      <img
        src="assets/dashboardImages/shivakumarswamyji.jpg"
        alt="Sri Shivakumara Swamiji"
        class="h-full w-full object-cover [-webkit-mask-image:radial-gradient(circle_at_center,black_58%,transparent_88%)] [mask-image:radial-gradient(circle_at_center,black_58%,transparent_88%)]"
      />
    </div>
  </div>
</section>
