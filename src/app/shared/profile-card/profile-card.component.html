<div
  class="flex flex-col items-center gap-6 rounded-3xl bg-white p-6 shadow-lg shadow-stone-200/60 sm:p-8 md:flex-row"
  [class.md:flex-row-reverse]="imagePosition === 'right'"
>
  <div
    class="h-40 w-40 shrink-0 overflow-hidden rounded-3xl shadow-md ring-4 ring-orange-50 sm:h-48 sm:w-48"
  >
    <img [src]="image" [alt]="alt" class="h-full w-full object-cover" />
  </div>
  <p class="text-center text-base leading-relaxed text-stone-600 md:text-left">
    {{ description }}
  </p>
</div>
