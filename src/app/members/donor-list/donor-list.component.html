<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10">
  <app-page-header eyebrow="Members" title="Donor List" />

  @if (vm$ | async; as vm) {
    <div class="mt-6 rounded-3xl bg-white p-5 shadow-lg shadow-stone-200/60 sm:max-w-xs">
      <p class="text-xs font-medium uppercase tracking-wide text-stone-400">Total Donors</p>
      <p class="mt-2 text-2xl font-bold text-stone-900">{{ vm.donors.length }}</p>
    </div>

    @if (vm.error) {
      <div class="mt-6 rounded-3xl border border-dashed border-red-200 bg-red-50/60 px-5 py-3 text-sm text-red-700">
        Couldn't load donors right now. Please try again later.
      </div>
    }

    <div class="mt-6">
      <app-data-table
        [data]="vm.donors"
        [columns]="columns"
        [searchKeys]="['name', 'donarId']"
        [loading]="vm.loading"
        searchPlaceholder="Search by name or donor ID"
        emptyMessage="No donors match your search."
      />
    </div>
  }
</div>
