<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10">
  <app-page-header eyebrow="Members" title="Donation" />

  <div class="mt-6 grid gap-6 lg:grid-cols-5">
    <form
      class="rounded-3xl bg-white p-6 shadow-lg shadow-stone-200/60 lg:col-span-2"
      (ngSubmit)="submitDonation()"
    >
      <h3 class="text-base font-semibold text-stone-900">Record a Donation</h3>
      <p class="mt-1 text-sm text-stone-500">Add a new donation to keep the donor ledger up to date.</p>

      <div
        *ngIf="submitted"
        class="mt-4 rounded-xl bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700"
      >
        Donation recorded successfully.
      </div>

      <div class="mt-5 space-y-4">
        <div>
          <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Donor Name</label>
          <input
            type="text"
            name="donorName"
            [(ngModel)]="form.donorName"
            required
            placeholder="e.g. Ramesh Kulkarni"
            class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
          />
        </div>

        <div>
          <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Amount</label>
          <div class="relative mt-1.5">
            <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-sm text-stone-400">₹</span>
            <input
              type="number"
              name="amount"
              [(ngModel)]="form.amount"
              required
              min="1"
              placeholder="5000"
              class="w-full rounded-xl border border-stone-200 py-2.5 pl-7 pr-3 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
            />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Date</label>
            <input
              type="date"
              name="date"
              [(ngModel)]="form.date"
              required
              class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
            />
          </div>

          <div>
            <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Payment Mode</label>
            <select
              name="mode"
              [(ngModel)]="form.mode"
              class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
            >
              <option *ngFor="let mode of paymentModes" [value]="mode">{{ mode }}</option>
            </select>
          </div>
        </div>

        <div>
          <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Notes (optional)</label>
          <textarea
            name="notes"
            [(ngModel)]="form.notes"
            rows="3"
            placeholder="Purpose or remarks"
            class="mt-1.5 w-full resize-none rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
          ></textarea>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="submitting"
        class="mt-6 flex w-full items-center justify-center gap-2 rounded-full bg-orange-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-orange-700 active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-70"
      >
        <svg
          *ngIf="submitting"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          class="h-4 w-4 animate-spin"
        >
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" class="opacity-25" />
          <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
        </svg>
        {{ submitting ? 'Saving...' : 'Save Donation' }}
      </button>
    </form>

    <div class="rounded-3xl bg-white p-6 shadow-lg shadow-stone-200/60 lg:col-span-3">
      <h3 class="text-base font-semibold text-stone-900">Recent Donations</h3>

      <div class="mt-4 overflow-x-auto">
        <table class="w-full min-w-[480px] text-left text-sm">
          <thead>
            <tr class="border-b border-stone-100 text-xs font-semibold uppercase tracking-wide text-stone-400">
              <th class="py-3 pr-4">Donor</th>
              <th class="py-3 pr-4">Amount</th>
              <th class="py-3 pr-4">Date</th>
              <th class="py-3 pr-4">Mode</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-stone-50">
            <tr *ngFor="let donation of recentDonations" class="transition hover:bg-orange-50/40">
              <td class="py-4 pr-4 font-semibold text-stone-900">{{ donation.donorName }}</td>
              <td class="py-4 pr-4 text-stone-600">{{ donation.amount | currency: 'INR' : 'symbol' : '1.0-0' }}</td>
              <td class="py-4 pr-4 text-stone-600">{{ donation.date }}</td>
              <td class="py-4 pr-4">
                <span class="inline-flex rounded-full bg-orange-50 px-3 py-1 text-xs font-semibold text-orange-700">
                  {{ donation.mode }}
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
