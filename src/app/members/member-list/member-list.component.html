<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10">
  <app-page-header eyebrow="Members" title="Member List" />

  @if (vm$ | async; as vm) {
    @if (vm.error) {
      <div class="mt-6 rounded-3xl border border-dashed border-red-200 bg-red-50/60 px-5 py-3 text-sm text-red-700">
        Couldn't load members right now. Please try again later.
      </div>
    }

    <div class="relative mt-6">
      <app-data-table
        [data]="vm.members"
        [columns]="columns"
        [searchKeys]="['name', 'memberId']"
        searchPlaceholder="Search by name or member ID"
        emptyMessage="No members match your search."
      >
        <select
          tableFilters
          [(ngModel)]="statusFilter"
          class="w-full rounded-xl border border-stone-200 px-3 py-2 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100 sm:w-44"
        >
          <option value="All">All statuses</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </app-data-table>

      @if (vm.loading) {
        <div class="absolute inset-0 z-10 flex items-center justify-center rounded-3xl bg-white/80">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-8 w-8 animate-spin text-orange-600">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" class="opacity-25" />
            <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          </svg>
        </div>
      }
    </div>
  }
</div>
