<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10">
  <app-page-header eyebrow="Updates" title="Members Registered">
    <button
      type="button"
      (click)="goToAddMember()"
      class="inline-flex items-center gap-2 rounded-full bg-orange-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-orange-700 active:scale-[0.98]"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-4 w-4">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      Add Member
    </button>
  </app-page-header>

  @if (vm$ | async; as vm) {
    @if (vm.error) {
      <div class="mt-6 rounded-3xl border border-dashed border-red-200 bg-red-50/60 px-5 py-3 text-sm text-red-700">
        Couldn't load registered members right now. Please try again later.
      </div>
    }

    <div class="relative mt-6">
      <app-data-table
        [data]="vm.members"
        [columns]="columns"
        [searchKeys]="['name']"
        searchPlaceholder="Search by name"
        emptyMessage="No registered members match your search."
      />

      @if (vm.loading) {
        <div class="absolute inset-0 z-10 flex items-center justify-center rounded-3xl bg-white/80">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-8 w-8 animate-spin text-orange-600">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" class="opacity-25" />
            <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          </svg>
        </div>
      }
    </div>
  }
</div>
