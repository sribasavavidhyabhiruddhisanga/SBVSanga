<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10">
  <app-page-header eyebrow="SCHOLARSHIP" title="Scholarship List" />

  @if (vm$ | async; as vm) {
    @if (vm.error) {
      <div
        class="mt-6 rounded-3xl border border-dashed border-red-200 bg-red-50/60 px-5 py-3 text-sm text-red-700"
      >
        Couldn't load scholarship records right now. Please try again later.
      </div>
    }

    <div class="mt-6">
      <app-data-table
        [data]="vm.scholarships"
        [columns]="columns"
        [searchKeys]="['studentName', 'email']"
        [loading]="vm.loading"
        searchPlaceholder="Search by student name or email"
        emptyMessage="No scholarship records match your search."
      />
    </div>
  }
</div>
