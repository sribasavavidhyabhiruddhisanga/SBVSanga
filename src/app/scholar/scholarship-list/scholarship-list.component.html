<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10">
  <app-page-header eyebrow="SCHOLARSHIP" title="Scholarship List" />

  @if (vm$ | async; as vm) {
    @if (vm.error) {
      <div
        class="mt-6 rounded-3xl border border-dashed border-red-200 bg-red-50/60 px-5 py-3 text-sm text-red-700"
      >
        Couldn't load scholarship records right now. Please try again later.
      </div>
    }

    <div class="relative mt-6">
      <app-data-table
        [data]="vm.scholarships"
        [columns]="columns"
        [searchKeys]="['studentName', 'email']"
        searchPlaceholder="Search by student name or email"
        emptyMessage="No scholarship records match your search."
      />

      @if (vm.loading) {
        <div class="absolute inset-0 z-10 flex items-center justify-center rounded-3xl bg-white/80">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-8 w-8 animate-spin text-orange-600">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" class="opacity-25" />
            <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          </svg>
        </div>
      }
    </div>
  }
</div>
