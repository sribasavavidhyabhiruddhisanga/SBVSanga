<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10">
  <app-page-header eyebrow="Scholar" title="Scholarship List" />

  <div *ngIf="loading" class="mt-6 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    <div *ngFor="let row of [1, 2, 3, 4, 5, 6]" class="animate-pulse rounded-3xl bg-white p-6 shadow-lg shadow-stone-200/60">
      <div class="h-12 w-12 rounded-2xl bg-stone-100"></div>
      <div class="mt-4 h-4 w-3/4 rounded bg-stone-100"></div>
      <div class="mt-2 h-3 w-full rounded bg-stone-100"></div>
      <div class="mt-6 h-3 w-1/2 rounded bg-stone-100"></div>
    </div>
  </div>

  <div *ngIf="!loading" class="mt-6 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    <div
      *ngFor="let scholarship of scholarships"
      class="flex flex-col rounded-3xl bg-white p-6 shadow-lg shadow-stone-200/60 transition hover:-translate-y-1 hover:shadow-xl"
    >
      <div class="flex items-start justify-between">
        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-orange-50 text-orange-600">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-6 w-6">
            <path
              d="M12 3 2 8l10 5 8-4v6M6 10v5c0 1.5 2.5 3 6 3s6-1.5 6-3v-5"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <span
          class="inline-flex h-fit rounded-full px-3 py-1 text-xs font-semibold"
          [class.bg-emerald-50]="scholarship.status === 'Open'"
          [class.text-emerald-700]="scholarship.status === 'Open'"
          [class.bg-stone-100]="scholarship.status === 'Closed'"
          [class.text-stone-500]="scholarship.status === 'Closed'"
        >
          {{ scholarship.status }}
        </span>
      </div>

      <h4 class="mt-4 text-base font-semibold text-stone-900">{{ scholarship.name }}</h4>
      <p class="mt-2 text-sm text-stone-500">{{ scholarship.eligibility }}</p>

      <div class="mt-4 flex items-center justify-between text-sm">
        <span class="font-bold text-stone-900">{{ scholarship.amount | currency: 'INR' : 'symbol' : '1.0-0' }}</span>
        <span class="text-xs text-stone-400">Deadline: {{ scholarship.deadline }}</span>
      </div>

      <a
        [routerLink]="['/scholar/scholarship-apply']"
        [queryParams]="{ scholarship: scholarship.name }"
        class="mt-5 inline-flex items-center gap-1 text-sm font-semibold text-orange-700 transition hover:text-orange-800"
      >
        Apply Now
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-4 w-4">
          <path d="M5 12h14m-6-6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
    </div>
  </div>
</div>
