<div class="relative mx-auto max-w-3xl px-4 py-8 sm:px-6 sm:py-10">
  @if (submitting) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-white/70 backdrop-blur-sm">
      <div class="flex flex-col items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-10 w-10 animate-spin text-orange-600">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" class="opacity-25" />
          <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
        </svg>
        <p class="text-sm font-semibold text-stone-600">Submitting your application...</p>
      </div>
    </div>
  }

  <app-page-header eyebrow="Community" title="Scholarship Apply" />

  <form
    class="mt-6 rounded-3xl bg-white p-6 shadow-lg shadow-stone-200/60 sm:p-8"
    [formGroup]="form"
    (ngSubmit)="submitApplication()"
  >
    <h3 class="text-base font-semibold text-stone-900">Scholarship Application Form</h3>
    <p class="mt-1 text-sm text-stone-500">All fields are required.</p>

    <div class="mt-5 grid gap-4 sm:grid-cols-2">
      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Applicant Name</label>
        <input
          type="text"
          formControlName="name"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Email ID</label>
        <input
          type="text"
          formControlName="emailId"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">UPI Linked Phone Number</label>
        <input
          type="text"
          formControlName="upiLinked_Phone"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Referred By</label>
        <input
          type="text"
          formControlName="referredBy"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div class="sm:col-span-2">
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Complete Address</label>
        <textarea
          formControlName="address"
          rows="3"
          class="mt-1.5 w-full resize-none rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        ></textarea>
      </div>

      <div class="sm:col-span-2">
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Parent's Name & Occupation</label>
        <textarea
          formControlName="parentsName_occuptation"
          rows="3"
          class="mt-1.5 w-full resize-none rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        ></textarea>
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Institution Name</label>
        <input
          type="text"
          formControlName="institution Name"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Current Course / Education</label>
        <input
          type="text"
          formControlName="currentEducation"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Percentage / Marks Obtained</label>
        <input
          type="text"
          formControlName="percentage_marks"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Previously Availed Scholarship?</label>
        <input
          type="text"
          formControlName="availedScholarship"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Bank Account Holder Name</label>
        <input
          type="text"
          formControlName="accountHolderName"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Bank Name</label>
        <input
          type="text"
          formControlName="bankName"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Bank Account Number</label>
        <input
          type="text"
          formControlName="accountNumber"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div>
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">IFSC Code</label>
        <input
          type="text"
          formControlName="ifscCode"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div class="sm:col-span-2">
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Verification Score</label>
        <input
          type="text"
          formControlName="score"
          class="mt-1.5 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm text-stone-700 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
        />
      </div>

      <div class="sm:col-span-2">
        <label class="text-xs font-medium uppercase tracking-wide text-stone-500">Supporting Document</label>
        <div class="mt-1.5 flex items-center justify-center rounded-xl border-2 border-dashed border-stone-200 px-4 py-8 text-center transition hover:border-orange-300">
          <div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="mx-auto h-8 w-8 text-stone-400">
              <path
                d="M12 16V4m0 0 4 4m-4-4-4 4M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <p class="mt-2 text-sm text-stone-500">Click to browse — JPG, JPEG, PNG, or PDF only, max 2MB</p>
            <input
              type="file"
              accept=".jpg,.jpeg,.png,.pdf"
              (change)="onFileSelected($event)"
              class="mt-3 block w-full text-xs text-stone-500 file:mr-3 file:rounded-full file:border-0 file:bg-orange-50 file:px-4 file:py-2 file:text-xs file:font-semibold file:text-orange-700 hover:file:bg-orange-100"
            />
            @if (selectedFile) {
              <p class="mt-2 text-xs font-medium text-emerald-600">Selected: {{ selectedFile.name }}</p>
            }
          </div>
        </div>
      </div>
    </div>

    <button
      type="submit"
      [disabled]="form.invalid || submitting"
      class="mt-6 flex w-full items-center justify-center gap-2 rounded-full bg-orange-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-orange-700 active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-50"
    >
      @if (submitting) {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-4 w-4 animate-spin">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" class="opacity-25" />
          <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
        </svg>
      }
      {{ submitting ? 'Submitting...' : 'Submit Application' }}
    </button>
  </form>
</div>
